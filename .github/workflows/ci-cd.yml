name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev-sidy
  pull_request:
    branches:
      - main
      - dev-sidy

env:
  NODE_VERSION: '20'
  DOCKER_IMAGE_NAME: 'sidydiopbalde/bem_pointage_backend'

jobs:
  # ========================================
  # CI — Lint & Build check
  # ========================================
  ci:
    name: CI — Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Build (TypeScript check)
        run: npm run build

  # ========================================
  # Build & Push Docker Image
  # ========================================
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push'
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ========================================
  # Deploy to Render (Production — main only)
  # ========================================
  deploy-production:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render deployment
        id: deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          echo "Triggering deployment on Render..."
          RESPONSE=$(curl -s -X POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "do_not_clear"}')
          echo "Response: $RESPONSE"
          DEPLOY_ID=$(echo "$RESPONSE" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
          echo "deploy_id=$DEPLOY_ID" >> "$GITHUB_OUTPUT"
          echo "Deploy ID: $DEPLOY_ID"

      - name: Wait for deployment to complete
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          DEPLOY_ID: ${{ steps.deploy.outputs.deploy_id }}
        run: |
          echo "Waiting for deployment $DEPLOY_ID to complete..."
          for i in $(seq 1 20); do
            sleep 30
            STATUS=$(curl -s \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys/${DEPLOY_ID}" \
              | grep -o '"status":"[^"]*"' | cut -d'"' -f4)
            echo "Attempt $i/20 — Status: $STATUS"
            if [ "$STATUS" = "live" ]; then
              echo "✅ Deployment successful!"
              exit 0
            elif [ "$STATUS" = "deactivated" ] || [ "$STATUS" = "build_failed" ] || [ "$STATUS" = "update_failed" ]; then
              echo "❌ Deployment failed with status: $STATUS"
              exit 1
            fi
          done
          echo "⚠️ Timed out waiting for deployment"
          exit 1
